name: Build RPM

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:43

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: dnf install -y rpm-build rpmdevtools

      - name: Setup rpmbuild tree
        run: mkdir -p /tmp/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create source tarball
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p warp-tray-${VERSION}
          cp warp-tray.py warp-tray.desktop LICENSE warp-tray-${VERSION}/
          tar czf /tmp/rpmbuild/SOURCES/warp-tray-${VERSION}.tar.gz warp-tray-${VERSION}

      - name: Update spec version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s/^Version:.*/Version:        ${VERSION}/" warp-tray.spec

      - name: Build RPM
        run: |
          rpmbuild -bb warp-tray.spec --define "_topdir /tmp/rpmbuild"

      - name: Upload RPM to release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/rpmbuild/RPMS/noarch/warp-tray-*.rpm
